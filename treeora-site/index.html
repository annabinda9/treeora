<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treeora Alcove — In arrivo</title>
<meta name="description" content="Treeora Alcove, un nuovo rifugio tra il verde. In arrivo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="stage">
    <img class="mark" src="./assets/treeora-logo.png" alt="Treeora Alcove">

    <p class="eyebrow">Un nuovo rifugio tra il verde</p>
    <h1>Sta <em>germogliando</em>.</h1>
    <div class="divider"></div>
    <p class="lede">Stiamo preparando qualcosa con calma, come si fa con le cose che devono durare. Lascia la tua email: ti scriviamo noi non appena le porte sono aperte.</p>

    <form id="notify-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="email" name="email" placeholder="La tua email" required>
      <button type="submit">Avvisami</button>
    </form>
    <p class="form-note" id="form-note"></p>
  </div>

  <footer>
    <span class="funded-label">Progetto finanziato da</span>
    <img src="./assets/eu-logo.png" alt="Finanziato dall'Unione europea – NextGenerationEU">
  </footer>

  <script>
    const form = document.getElementById('notify-form');
    const note = document.getElementById('form-note');
    form.addEventListener('submit', async (e) => {
      if (form.action.includes('YOUR_FORM_ID')) {
        e.preventDefault();
        note.textContent = 'Collega il modulo a Formspree per attivare le iscrizioni (vedi README).';
        return;
      }
      e.preventDefault();
      note.textContent = 'Invio in corso…';
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          note.textContent = 'Fatto! Ti avviseremo appena pronti.';
          form.reset();
        } else {
          note.textContent = 'Qualcosa non ha funzionato, riprova più tardi.';
        }
      } catch (err) {
        note.textContent = 'Qualcosa non ha funzionato, riprova più tardi.';
      }
    });
  </script>

</body>
</html>
