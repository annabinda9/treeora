<style>
  :root{
    --bg:#cdc8c4;
    --ink:#3d362c;
    --deep:#2b2620;
    --olive:#7c8567;
    --gold:#a8873f;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    overflow-x:hidden;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:6vh 6vw 4vh;
    position:relative;
  }

  /* ambient canopy glow, breathing very slowly behind the mark */
  .glow{
    position:absolute;
    top:50%;
    left:50%;
    width:min(70vw, 640px);
    height:min(70vw, 640px);
    transform:translate(-50%,-58%);
    background:radial-gradient(circle, rgba(124,133,103,0.22) 0%, rgba(124,133,103,0.08) 45%, rgba(124,133,103,0) 72%);
    filter:blur(6px);
    animation:breathe 9s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }

  @keyframes breathe{
    0%,100%{ transform:translate(-50%,-58%) scale(0.94); opacity:0.85; }
    50%{ transform:translate(-50%,-58%) scale(1.04); opacity:1; }
  }

  .wrap{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    max-width:520px;
    width:100%;
    text-align:center;
    opacity:0;
    animation:rise 1.4s ease-out 0.15s forwards;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .mark{
    width:min(52vw, 300px);
    height:auto;
    display:block;
    margin-bottom:clamp(1.6rem, 4vh, 2.6rem);
  }

  /* a thin branch-like line that extends before the tagline appears */
  .branch{
    width:0;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    animation:grow 1.6s ease-out 1.1s forwards;
    margin-bottom:1.6rem;
  }

  @keyframes grow{
    from{ width:0; opacity:0; }
    to{ width:120px; opacity:1; }
  }

  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(1.15rem, 2.6vw, 1.5rem);
    color:var(--deep);
    margin:0 0 1.1rem;
    letter-spacing:0.01em;
  }

  .status{
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size:0.8rem;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--olive);
    margin:0;
  }

  .status span{
    display:inline-block;
    opacity:0;
    animation:leaf-in 0.5s ease-out forwards;
  }

  @keyframes leaf-in{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  footer{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.7rem;
    margin-top:6vh;
    padding-top:2.2rem;
    border-top:1px solid rgba(61,54,44,0.18);
    width:100%;
    max-width:360px;
    opacity:0;
    animation:rise 1.2s ease-out 1.6s forwards;
  }

  footer img{
    width:74px;
    height:auto;
  }

  .logos-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1.4rem;
    flex-wrap:wrap;
  }

  .logos-row img{
    height:56px;
    width:auto;
    max-width:150px;
    object-fit:contain;
  }

  footer p{
    margin:0;
    font-family:'Jost', sans-serif;
    font-size:0.7rem;
    letter-spacing:0.04em;
    line-height:1.5;
    color:var(--ink);
    text-align:center;
    max-width:320px;
  }

  .privacy-link{
    font-family:'Jost', sans-serif;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--olive);
    text-decoration:none;
    border-bottom:1px solid var(--olive);
    margin-top:0.3rem;
  }

  @media (prefers-reduced-motion: reduce){
    .glow, .wrap, .branch, .status span, footer{
      animation:none !important;
      opacity:1 !important;
    }
    .branch{ width:120px; }
  }
</style>
</head>
